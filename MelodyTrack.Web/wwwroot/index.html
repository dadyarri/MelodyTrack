<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MelodyTrack.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MelodyTrack.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.outsideClickListener = function (dotnetHelper, menuId, handler) {
            const menuElement = document.getElementById(menuId);

            console.log('outsideClickListener');

            function handleClickOutside(event) {
                if (!menuElement.contains(event.target)) {
                    dotnetHelper.invokeMethodAsync(handler);
                }
            }

            // Add event listener for clicks
            document.addEventListener("click", handleClickOutside);

            // Return cleanup function
            return () => document.removeEventListener("click", handleClickOutside);
        };
    </script>

</body>

</html>
