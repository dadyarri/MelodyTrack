on:
  push:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            global.json
            MelodyTrack.slnx
            MelodyTrack.Backend/*.csproj
            MelodyTrack.Backend.Tests/*.csproj
      - name: Restore dependencies
        run: dotnet restore MelodyTrack.slnx
      - name: Build
        run: dotnet build MelodyTrack.slnx --no-restore -c Release
      - name: Run tests
        run: dotnet test MelodyTrack.slnx --no-build --no-restore -c Release --verbosity normal

  push-to-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MelodyTrack.Backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/melody-track-backend:latest
            ghcr.io/${{ github.repository_owner }}/melody-track-backend:${{ github.sha }}
